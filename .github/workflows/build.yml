name: Build APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 35
        build-tools: '35.0.0'
    - name: Make gradlew executable
      run: chmod +x NexDB/gradlew || true
    - name: Build Debug APK
      run: |
        cd NexDB
        ./gradlew assembleDebug --no-daemon 2>/dev/null || (gradle wrapper --gradle-version 8.9 --no-daemon && ./gradlew assembleDebug --no-daemon)
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NexDB-debug
        path: NexDB/app/build/outputs/apk/debug/*.apk
