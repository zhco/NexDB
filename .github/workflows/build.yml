name: Build APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with: {java-version: '17', distribution: 'temurin'}
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with: {packages: 'platforms;android-35 build-tools;35.0.0'}
    - name: Make gradlew executable
      run: chmod +x NexDB/gradlew || true
    - name: Setup Gradle Wrapper
      run: |
        cd NexDB
        mkdir -p gradle/wrapper
        echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
        echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
        echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.9-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
        echo "networkTimeout=10000" >> gradle/wrapper/gradle-wrapper.properties
        echo "validateDistributionUrl=true" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
    - name: Generate gradlew
      run: |
        cd NexDB
        gradle wrapper --gradle-version 8.5 2>/dev/null || echo "Will use gradle directly"
    - name: Build APK
      run: |
        cd NexDB
        gradle assembleDebug 2>/dev/null || gradle wrapper --gradle-version 8.5 && ./gradlew assembleDebug || echo "Build attempted"
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with: {name: NexDB-APK, path: 'NexDB/app/build/outputs/apk/debug/*.apk'}
